<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ketemu.in — Pusat Informasi Kehilangan Barang</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .leaflet-container { border-radius: 1rem; z-index: 1; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-800 font-sans min-h-screen pb-20 lg:pb-0">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-xs">
        <div class="max-w-7xl mx-auto px-4 lg:px-6 h-16 flex items-center justify-between">
            <span class="text-2xl font-black bg-gradient-to-r from-slate-900 to-slate-700 bg-clip-text text-transparent cursor-pointer" onclick="window.location.reload()">ketemu<span class="text-orange-500">.in</span></span>
            <div class="flex items-center gap-2 lg:gap-4">
                <span class="text-[11px] lg:text-xs font-bold text-slate-700 bg-slate-100 border border-slate-200 px-2.5 py-1.5 rounded-xl">👋 @{{ username }}</span>
                <a href="/logout" class="text-[11px] lg:text-xs font-extrabold text-red-500 bg-red-50 px-2.5 py-1.5 rounded-xl">Keluar</a>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 lg:px-6 py-6 lg:py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <aside class="hidden lg:block lg:col-span-3 space-y-2 sticky top-24 h-fit">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider px-3 mb-2">Navigasi Menu</p>
            <button onclick="pindahMenuTab('tab-papan', this)" id="sidebar-papan" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-black text-sm text-indigo-600 bg-indigo-50/80 transition-all text-left">
                <span class="text-lg">📋</span> Papan Laporan Terkini
            </button>
            <button onclick="pindahMenuTab('tab-form', this)" id="sidebar-form" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm text-slate-600 hover:bg-slate-100 transition-all text-left">
                <span class="text-lg">🔍</span> Formulir Laporan Baru
            </button>
            <button onclick="pindahMenuTab('tab-pesan', this)" id="sidebar-pesan" class="w-full flex items-center justify-between px-4 py-3 rounded-xl font-bold text-sm text-slate-600 hover:bg-slate-100 transition-all text-left">
                <div class="flex items-center gap-3">
                    <span class="text-lg">💬</span> Kotak Masuk Pesan
                </div>
                <span id="badge-sidebar" class="hidden bg-red-500 text-white font-black text-[10px] px-2 py-0.5 rounded-full">0</span>
            </button>
        </aside>

        <main class="col-span-1 lg:col-span-9">
            
            <div id="tab-papan" class="tab-content active space-y-4">
                <h2 class="text-base font-black text-slate-900 border-b border-slate-200 pb-2">📋 Papan Laporan Terkini</h2>
                <div id="live-items-feed" class="grid grid-cols-1 md:grid-cols-2 gap-4 overflow-y-auto lg:max-h-[75vh] pr-1"></div>
            </div>

            <div id="tab-form" class="tab-content space-y-4">
                <div class="bg-white p-5 lg:p-6 rounded-2xl border border-slate-200 shadow-sm max-w-2xl mx-auto space-y-4">
                    <h2 class="text-base font-black text-slate-900">🔍 Buat Formulir Laporan Baru</h2>
                    <form action="/tambah" method="POST" enctype="multipart/form-data" class="space-y-3.5" onsubmit="return pastikanKoordinatTersedia()">
                        <div>
                            <label class="block font-extrabold text-slate-500 text-[10px] uppercase mb-1">Status Laporan</label>
                            <select name="status" class="w-full border border-slate-200 p-2.5 rounded-xl text-xs bg-slate-50">
                                <option value="Ditemukan">Saya Menemukan Barang</option>
                                <option value="Hilang">Saya Kehilangan Barang</option>
                            </select>
                        </div>

                        <div>
                            <label class="block font-extrabold text-slate-500 text-[10px] uppercase mb-1">Visual Bukti Gambar</label>
                            <div class="space-y-2">
                                <div class="grid grid-cols-2 gap-2">
                                    <button type="button" onclick="bukaKameraSesuaiDevice()" class="bg-slate-900 hover:bg-slate-800 text-white p-2.5 rounded-xl text-xs font-bold text-center cursor-pointer transition-all">
                                        📷 Buka Kamera Live
                                    </button>
                                    <label class="bg-orange-50 text-orange-600 p-2.5 rounded-xl text-xs font-bold border border-orange-100 text-center cursor-pointer hover:bg-orange-100 transition-all">
                                        📁 Ambil Galeri File
                                        <input type="file" id="file-galeri" name="foto_barang" accept="image/*" onchange="previewMediaFile(this)" class="hidden">
                                    </label>
                                </div>
                                <input type="file" id="file-kamera-hp" name="foto_barang_cam" accept="image/*" capture="environment" onchange="previewMediaFile(this)" class="hidden">

                                <div id="box-preview" class="hidden w-full h-44 rounded-xl border border-dashed border-slate-300 overflow-hidden justify-center items-center relative bg-slate-50">
                                    <img id="img-preview" src="#" class="h-full object-cover">
                                    <button type="button" onclick="hapusFotoSistem()" class="absolute top-2 right-2 bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-md font-bold">Hapus</button>
                                </div>
                            </div>
                        </div>

                        <div>
                            <label class="block font-extrabold text-slate-500 text-[10px] uppercase mb-1">Alamat / Lokasi Kejadian</label>
                            <div class="flex gap-1.5">
                                <input type="text" id="input-lokasi" name="lokasi" required placeholder="Ketik manual atau gunakan tombol GPS di bawah..." onkeydown="cekTombolEnter(event)" class="w-full border border-slate-200 p-2.5 rounded-xl text-xs bg-slate-50">
                                <button type="button" id="btn-cari-lokasi" onclick="cariLokasiOtomatis()" class="bg-orange-500 hover:bg-orange-600 text-white px-5 rounded-xl font-bold text-xs whitespace-nowrap transition-all">Cari Alamat</button>
                            </div>
                            <p id="notif-pencarian" class="text-[11px] text-slate-400 mt-1 hidden"></p>
                        </div>

                        <button type="button" id="btn-gps" onclick="sinkronkanGPSBeranda()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-xl font-bold text-xs transition-all">
                            🎯 Deteksi Koordinat GPS Saya
                        </button>

                        <div id="map-input" class="w-full rounded-xl border border-slate-200" style="height: 180px;"></div>
                        <input type="hidden" id="form-latitude" name="latitude">
                        <input type="hidden" id="form-longitude" name="longitude">

                        <div>
                            <label class="block font-extrabold text-slate-500 text-[10px] uppercase mb-1">Nama Barang</label>
                            <input type="text" name="nama" required placeholder="Contoh: Kunci Motor..." class="w-full border border-slate-200 p-2.5 rounded-xl text-xs bg-slate-50">
                        </div>
                        <div>
                            <label class="block font-extrabold text-slate-500 text-[10px] uppercase mb-1">Ciri-Ciri Barang</label>
                            <textarea name="deskripsi" rows="2" required placeholder="Warna, ciri khusus..." class="w-full border border-slate-200 p-2.5 rounded-xl text-xs bg-slate-50"></textarea>
                        </div>
                        <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white py-3 rounded-xl font-extrabold text-xs uppercase tracking-wider transition-all">Kirim Laporan</button>
                    </form>
                </div>
            </div>

            <div id="tab-pesan" class="tab-content space-y-4">
                <div class="flex justify-between items-center border-b border-slate-200 pb-2">
                    <h2 class="text-base font-black text-slate-900">📬 Kotak Masuk Pesan</h2>
                    <button type="button" onclick="aktifkanAudioManual()" id="btn-audio-status" class="text-[10px] bg-emerald-50 border border-emerald-200 text-emerald-700 font-bold px-2 py-1 rounded-lg">🔔 Notifikasi Suara Aktif</button>
                </div>
                <div id="live-inbox-feed" class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm space-y-4 overflow-y-auto lg:max-h-[75vh]"></div>
            </div>
        </main>
    </div>

    <div id="modal-webcam" class="fixed inset-0 bg-black/80 z-[999] hidden flex-col items-center justify-center p-4">
        <div class="bg-white p-4 rounded-2xl max-w-md w-full space-y-3 shadow-2xl">
            <div class="flex justify-between items-center">
                <h3 class="text-sm font-black text-slate-900">📸 Kamera Live Laptop</h3>
                <button type="button" onclick="tutupWebcamLaptop()" class="text-xs text-red-500 font-bold bg-red-50 px-2 py-1 rounded-lg">Tutup</button>
            </div>
            <div class="relative bg-black rounded-xl overflow-hidden aspect-video w-full flex items-center justify-center">
                <video id="webcam-stream" autoplay playsinline class="w-full h-full object-cover scale-x-[-1]"></video>
            </div>
            <button type="button" onclick="jepretFotoWebcam()" class="w-full bg-emerald-600 text-white py-2.5 rounded-xl text-xs font-bold shadow-md hover:bg-emerald-700">
                📸 Ambil Foto Sekarang
            </button>
            <canvas id="webcam-canvas" class="hidden"></canvas>
        </div>
    </div>

    <nav class="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 h-16 flex items-center justify-around px-2 z-50 shadow-lg">
        <button onclick="pindahMenuTab('tab-papan', this)" id="btn-nav-papan" class="flex flex-col items-center justify-center text-indigo-600 font-black transition-all">
            <span class="text-xl">📋</span>
            <span class="text-[10px] mt-0.5 tracking-tight">Papan Laporan</span>
        </button>
        <button onclick="pindahMenuTab('tab-form', this)" id="btn-nav-form" class="flex flex-col items-center justify-center bg-slate-400 text-white w-14 h-14 rounded-full -mt-5 border-4 border-[#f8fafc] shadow-md transition-all">
            <span class="text-xl">🔍</span>
        </button>
        <button onclick="pindahMenuTab('tab-pesan', this)" id="btn-nav-pesan" class="flex flex-col items-center justify-center text-slate-400 font-bold relative transition-all">
            <div id="badge-total-global" class="hidden absolute -top-1 -right-2 bg-red-500 text-white font-black text-[9px] px-1.5 py-0.5 rounded-full">0</div>
            <span class="text-xl">💬</span>
            <span class="text-[10px] mt-0.5 tracking-tight">Pesan</span>
        </button>
    </nav>

    <script>
        const defaultCenter = [-6.9667, 110.4167];
        let mapInput, markerInput, localStream = null;
        
        // State pelacak notifikasi suara berkala
        let totalUnreadLama = 0;
        let audioContextMuted = true;

        // FUNGSI NAVIGASI MENU UTAMA
        function pindahMenuTab(tabId, elemenDitekan) {
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');

            const btnPapan = document.getElementById('btn-nav-papan');
            const btnForm = document.getElementById('btn-nav-form');
            const btnPesan = document.getElementById('btn-nav-pesan');
            
            const sidePapan = document.getElementById('sidebar-papan');
            const sideForm = document.getElementById('sidebar-form');
            const sidePesan = document.getElementById('sidebar-pesan');

            btnPapan.className = "flex flex-col items-center justify-center text-slate-400 font-bold transition-all";
            btnForm.className = "flex flex-col items-center justify-center bg-slate-400 text-white w-14 h-14 rounded-full -mt-5 border-4 border-[#f8fafc] shadow-md transition-all";
            btnPesan.className = "flex flex-col items-center justify-center text-slate-400 font-bold relative transition-all";

            sidePapan.className = "w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm text-slate-600 hover:bg-slate-100 transition-all text-left";
            sideForm.className = "w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm text-slate-600 hover:bg-slate-100 transition-all text-left";
            sidePesan.className = "w-full flex items-center justify-between px-4 py-3 rounded-xl font-bold text-sm text-slate-600 hover:bg-slate-100 transition-all text-left";

            if(tabId === 'tab-papan') {
                btnPapan.className = "flex flex-col items-center justify-center text-indigo-600 font-black transition-all";
                sidePapan.className = "w-full flex items-center gap-3 px-4 py-3 rounded-xl font-black text-sm text-indigo-600 bg-indigo-50/80 transition-all text-left";
            } else if(tabId === 'tab-form') {
                btnForm.className = "flex flex-col items-center justify-center bg-slate-900 text-white w-14 h-14 rounded-full -mt-5 border-4 border-[#f8fafc] shadow-md transition-all";
                sideForm.className = "w-full flex items-center gap-3 px-4 py-3 rounded-xl font-black text-sm text-indigo-600 bg-indigo-50/80 transition-all text-left";
                setTimeout(() => { mapInput.invalidateSize(); }, 200); 
            } else if(tabId === 'tab-pesan') {
                btnPesan.className = "flex flex-col items-center justify-center text-orange-500 font-black relative transition-all";
                sidePesan.className = "w-full flex items-center justify-between px-4 py-3 rounded-xl font-black text-sm text-indigo-600 bg-indigo-50/80 transition-all text-left";
                // Mengaktifkan audio otomatis saat user membuka tab pesan
                aktifkanAudioManual();
            }
        }

        // TANGGUNG JAWAB AUDIO NOTIFIKASI TANPA FILE EKSTERNAL (BEEP SYNTHESIZER)
        function aktifkanAudioManual() {
            audioContextMuted = false;
            document.getElementById('btn-audio-status').className = "text-[10px] bg-emerald-600 text-white font-bold px-2 py-1 rounded-lg";
            document.getElementById('btn-audio-status').innerText = "🔊 Suara Siap";
        }

        function bunyikanBelPesanBaru() {
            if (audioContextMuted) return; // Dicegah browser jika belum interaksi
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, ctx.currentTime); // Nada D5
                osc.frequency.setValueAtTime(880, ctx.currentTime + 0.1);  // Nada A5 (Melodi ganda ceria)
                
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            } catch(e) {}
        }

        function bukaKameraSesuaiDevice() {
            const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
            if (isMobile) {
                document.getElementById('file-kamera-hp').click();
            } else {
                bukaWebcamLaptop();
            }
        }

        function bukaWebcamLaptop() {
            const modal = document.getElementById('modal-webcam');
            const video = document.getElementById('webcam-stream');
            modal.style.display = 'flex';
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: "user" }, audio: false })
            .then(stream => { localStream = stream; video.srcObject = stream; })
            .catch(() => { alert("Gagal mengakses webcam."); tutupWebcamLaptop(); });
        }

        function tutupWebcamLaptop() {
            document.getElementById('modal-webcam').style.display = 'none';
            if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
        }

        function jepretFotoWebcam() {
            const video = document.getElementById('webcam-stream');
            const canvas = document.getElementById('webcam-canvas');
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            context.translate(canvas.width, 0); context.scale(-1, 1);
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg');
            document.getElementById('img-preview').src = dataUrl;
            document.getElementById('box-preview').style.display = 'flex';
            fetch(dataUrl).then(res => res.blob()).then(blob => {
                const fileBaru = new File([blob], "webcam_snap.jpg", { type: "image/jpeg" });
                const containerData = new DataTransfer(); containerData.items.add(fileBaru);
                document.getElementById('file-galeri').files = containerData.files; 
            });
            tutupWebcamLaptop();
        }

        // --- IDE PERBAIKAN 2: VALIDASI UKURAN FILE BERKAPASITAS MAKSIMAL 2MB ---
        function previewMediaFile(input) {
            if (input.files && input.files[0]) {
                const fileTarget = input.files[0];
                const batasanMaksimal = 2 * 1024 * 1024; // Konversi ke Bytes (2 Megabyte)

                if (fileTarget.size > batasanMaksimal) {
                    alert(`❌ File terlalu gendut! Ukuran foto Anda (${(fileTarget.size / (1024*1024)).toFixed(2)} MB) melebihi batas maksimal 2 MB. Silakan pilih foto lain atau kompres terlebih dahulu.`);
                    input.value = ""; // Batalkan file terpilih
                    hapusFotoSistem();
                    return;
                }

                const r = new FileReader();
                r.onload = function(e) {
                    document.getElementById('img-preview').src = e.target.result;
                    document.getElementById('box-preview').style.display = 'flex';
                };
                r.readAsDataURL(fileTarget);
            }
        }

        function hapusFotoSistem() {
            document.getElementById('box-preview').style.display = 'none';
            document.getElementById('img-preview').src = '#';
            document.getElementById('file-galeri').value = "";
            document.getElementById('file-kamera-hp').value = "";
        }

        // SETUP PETA LEAFLET - DIPERBAIKI MENGGUNAKAN LAYER SATELIT GOOGLE REAL-TIME
        try {
            mapInput = L.map('map-input', { zoomControl: true }).setView(defaultCenter, 13);
            
            // Mengubah tile layer default ke Google Maps/Earth Satellite Hybrid (Terbaru & selalu Sinkron)
            L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
                maxZoom: 20,
                subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
                attribution: '© Google Earth / Maps Realtime'
            }).addTo(mapInput);

            markerInput = L.marker(defaultCenter, { draggable: true }).addTo(mapInput);
            updateCoords(defaultCenter[0], defaultCenter[1]);
            
            markerInput.on('dragend', function() {
                let pos = markerInput.getLatLng();
                updateCoords(pos.lat, pos.lng);
                reverseGeocode(pos.lat, pos.lng);
            });
            mapInput.on('click', function(e) {
                markerInput.setLatLng(e.latlng);
                updateCoords(e.latlng.lat, e.latlng.lng);
                reverseGeocode(e.latlng.lat, e.latlng.lng);
            });
        } catch (e) { console.error(e); }

        function updateCoords(lat, lng) {
            document.getElementById('form-latitude').value = lat;
            document.getElementById('form-longitude').value = lng;
        }

        function cekTombolEnter(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                cariLokasiOtomatis();
            }
        }

        function cariLokasiOtomatis() {
            let q = document.getElementById('input-lokasi').value.trim();
            if(!q) return;
            const btnCari = document.getElementById('btn-cari-lokasi');
            const notif = document.getElementById('notif-pencarian');
            btnCari.innerText = "⏳ Mencari...";
            btnCari.disabled = true;
            notif.classList.remove('hidden');
            notif.className = "text-[11px] text-amber-600 mt-1";
            notif.innerText = "Sedang mencocokkan alamat...";

            fetch(`/api/cari-lokasi?q=${encodeURIComponent(q)}`)
                .then(r => r.json())
                .then(d => {
                    btnCari.innerText = "Cari Alamat";
                    btnCari.disabled = false;
                    if(d.status === "success" && d.lat) {
                        mapInput.setView([d.lat, d.lon], 16); 
                        markerInput.setLatLng([d.lat, d.lon]); 
                        updateCoords(d.lat, d.lon);
                        document.getElementById('input-lokasi').value = d.display_name;
                        notif.className = "text-[11px] text-emerald-600 mt-1";
                        notif.innerText = "📍 Lokasi berhasil ditemukan dan dikunci pada peta!";
                    } else {
                        notif.className = "text-[11px] text-red-500 mt-1";
                        notif.innerText = "❌ Alamat tidak ditemukan.";
                    }
                }).catch(() => {
                    btnCari.innerText = "Cari Alamat"; btnCari.disabled = false;
                });
        }

        function sinkronkanGPSBeranda() {
            if (!navigator.geolocation) { alert("Fitur GPS tidak didukung."); return; }
            document.getElementById('btn-gps').innerHTML = "⏳ Menghubungkan GPS...";
            navigator.geolocation.getCurrentPosition(function(p) {
                let lat = p.coords.latitude, lon = p.coords.longitude;
                mapInput.setView([lat, lon], 16);
                markerInput.setLatLng([lat, lon]);
                updateCoords(lat, lon);
                reverseGeocode(lat, lon);
                document.getElementById('btn-gps').innerHTML = "🎯 Deteksi Koordinat GPS Saya";
            }, function() {
                alert("Gagal mendapatkan lokasi.");
                document.getElementById('btn-gps').innerHTML = "🎯 Deteksi Koordinat GPS Saya";
            });
        }

        function reverseGeocode(lat, lon) {
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
                .then(r => r.json()).then(d => { 
                    if(d && d.display_name) document.getElementById('input-lokasi').value = d.display_name; 
                });
        }

        function fokusKeLokasiBarang(lat, lon, alamat) {
            pindahMenuTab('tab-form', document.getElementById('sidebar-form'));
            setTimeout(() => {
                mapInput.setView([lat, lon], 16); markerInput.setLatLng([lat, lon]); updateCoords(lat, lon);
                document.getElementById('input-lokasi').value = alamat;
                document.getElementById('map-input').scrollIntoView({ behavior: 'smooth' });
            }, 300);
        }

        function pastikanKoordinatTersedia() {
            let lat = document.getElementById('form-latitude').value;
            if(!lat) {
                alert("Silakan tentukan atau cari titik lokasi barang pada peta terlebih dahulu!");
                return false;
            }
            return true;
        }

        // SISTEM MUTASI FEED REALTIME & DETEKSI SUARA PESAN BARU
        function muatBerandaRealtime() {
            fetch('/api/home-data').then(r => r.json()).then(data => {
                const userLogin = data.current_user;
                const feedItems = document.getElementById('live-items-feed');
                let htmlItems = "";
                
                data.items.forEach(item => {
                    let img = item.foto ? `<img src="/static/uploads/${item.foto}" class="w-full h-40 object-cover rounded-xl mt-2 mb-2 border">` : '';
                    let color = item.status === 'Ditemukan' ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 'bg-red-50 text-red-700 border-red-100';
                    let tombolSelesai = "";
                    if (item.penemu === userLogin) {
                        tombolSelesai = `
                        <a href="/hapus/${item.id}" onclick="return confirm('Apakah barang ini benar sudah kembali?')" class="w-full text-center block mt-2 text-[10px] bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold py-2 rounded-xl shadow-xs">
                            ✅ Selesai / Sudah Ketemu Pemiliknya
                        </a>`;
                    }
                    let mapUrl = "https://www.google.com/maps/search/?api=1&query=" + item.lat + "," + item.lon;

                    htmlItems += `
                    <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-xs flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-center">
                                <span class="text-[9px] font-extrabold uppercase px-2 py-0.5 rounded border ${color}">${item.status}</span>
                                <a href="${mapUrl}" target="_blank" class="text-[10px] bg-indigo-50 text-indigo-600 border border-indigo-100 font-extrabold px-2.5 py-1 rounded-xl">🗺️ Peta Google</a>
                            </div>
                            <h3 class="text-sm font-black text-slate-900 mt-2 capitalize">${item.nama}</h3>
                            ${img}
                            <button onclick="fokusKeLokasiBarang(${item.lat}, ${item.lon}, '${item.lokasi_peta}')" class="text-[11px] text-left text-slate-500 mt-1 block font-medium w-full truncate">
                                📍 ${item.lokasi_peta} <span class="text-indigo-500 font-bold">(Lihat Form Peta)</span>
                            </button>
                        </div>
                        <div>
                            ${tombolSelesai}
                            <div class="flex items-center justify-between border-t border-slate-100 mt-3 pt-2 text-xs">
                                <span class="text-slate-400">Oleh: @${item.penemu}</span>
                                <a href="/item/${item.id}" class="text-orange-500 font-extrabold hover:underline">Hubungi Obrolan →</a>
                            </div>
                        </div>
                    </div>`;
                });
                feedItems.innerHTML = htmlItems || '<p class="text-xs text-slate-400 text-center py-6 border border-dashed rounded-xl col-span-2">Belum ada laporan.</p>';

                const feedInbox = document.getElementById('live-inbox-feed');
                let htmlInbox = "";
                let gridUnread = 0;
                
                data.inbox.forEach(chat => {
                    let keyStorage = "read_count_" + chat.chat_id;
                    let sudahDibaca = parseInt(localStorage.getItem(keyStorage)) || 0;
                    let unreadCount = chat.total_messages - sudahDibaca;
                    if (unreadCount < 0) unreadCount = 0;

                    let badgeBelumDibaca = "";
                    if (unreadCount > 0) {
                        gridUnread += unreadCount;
                        badgeBelumDibaca = `<span class="bg-red-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full">${unreadCount} baru</span>`;
                    }

                    htmlInbox += `
                    <div class="border-b border-slate-100 pb-3 last:border-0 last:pb-0 flex justify-between items-center gap-2 bg-slate-50/50 p-3 rounded-xl border mb-2">
                        <div class="flex-1 min-w-0">
                            <p class="text-[10px] text-slate-400">Barang: <strong class="text-slate-600">${chat.nama_barang}</strong></p>
                            <p class="text-xs text-slate-800 font-semibold truncate">@${chat.pengirim_terakhir}: <span class="font-normal text-slate-500">${chat.teks_terakhir}</span></p>
                            <a href="/item/${chat.item_id}?chat_id=${chat.chat_id}" class="text-[11px] text-indigo-600 font-bold mt-1 inline-block hover:underline">Masuk Ruang Diskusi</a>
                        </div>
                        <div class="shrink-0">${badgeBelumDibaca}</div>
                    </div>`;
                });
                feedInbox.innerHTML = htmlInbox || '<p class="text-xs text-slate-400 text-center py-6">Tidak ada obrolan aktif.</p>';

                // --- IDE PERBAIKAN 1: BUNYIKAN BEL JIKA ADA PERBEDAAN JUMLAH CHAT UNREAD BARU ---
                if (gridUnread > totalUnreadLama) {
                    bunyikanBelPesanBaru();
                }
                totalUnreadLama = gridUnread; // Kunci kondisi state terkini

                const badgeGlobal = document.getElementById('badge-total-global');
                const badgeSidebar = document.getElementById('badge-sidebar');

                if(gridUnread > 0) {
                    badgeGlobal.innerText = gridUnread;
                    badgeGlobal.classList.remove('hidden');
                    badgeSidebar.innerText = gridUnread;
                    badgeSidebar.classList.remove('hidden');
                } else {
                    badgeGlobal.classList.add('hidden');
                    badgeSidebar.classList.add('hidden');
                }

            }).catch(err => console.error(err));
        }
        
        setInterval(muatBerandaRealtime, 3000);
        window.addEventListener('load', () => { muatBerandaRealtime(); });
        // Mengizinkan aktivasi audio jika user melakukan klik sembarang tempat di halaman
        window.addEventListener('click', () => { if(audioContextMuted) aktifkanAudioManual(); }, { once: true });
    </script>
</body>
</html>
