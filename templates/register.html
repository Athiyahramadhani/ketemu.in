<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Baru — ketemu.in</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#f8fafc] flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl border border-slate-200/60 shadow-xl max-w-sm w-full mx-4">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-black text-slate-900 tracking-tight">Daftar Akun Baru</h2>
            <p class="text-xs text-slate-400 mt-1">Buat akun untuk mulai melaporkan kehilangan barang.</p>
        </div>
        <form action="/daftar" method="POST" class="space-y-4">
            <div>
                <label class="block font-extrabold text-slate-500 text-[11px] uppercase tracking-wider mb-1.5">Username Baru</label>
                <input type="text" name="username" required placeholder="Pilih username unik..." class="w-full border border-slate-200 p-3 rounded-xl text-xs bg-slate-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition-all">
            </div>
            <div>
                <label class="block font-extrabold text-slate-500 text-[11px] uppercase tracking-wider mb-1.5">Password</label>
                <input type="password" name="password" required placeholder="Buat password aman..." class="w-full border border-slate-200 p-3 rounded-xl text-xs bg-slate-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition-all">
            </div>
            <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-xl font-extrabold text-xs tracking-wider uppercase transition-all shadow-md cursor-pointer">Daftar Sekarang</button>
        </form>
        <div class="text-center mt-6 border-t border-slate-100 pt-4">
            <p class="text-xs text-slate-400">Sudah punya akun? <a href="/login" class="text-indigo-600 font-bold hover:underline">Masuk ke Aplikasi</a></p>
        </div>
    </div>
</body>
</html>
